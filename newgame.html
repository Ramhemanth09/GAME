<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hill Racer</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; overflow:hidden; background:#0a0a12; font-family: 'Segoe UI', Arial, sans-serif; }

  /* ---------- MENU ---------- */
  #menu {
    position:fixed; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background: radial-gradient(circle at 50% 0%, #24314f 0%, #0a0a12 70%);
    color:#fff; text-align:center; padding:20px; gap:22px;
  }
  #menu h1 { font-size:2.6em; letter-spacing:3px; text-shadow:0 0 20px #4fc3f7; }
  #menu p.sub { color:#9fb3d1; font-size:0.95em; margin-top:-10px; }
  .section { display:flex; flex-direction:column; gap:10px; align-items:center; }
  .section h2 { font-size:1em; letter-spacing:2px; color:#7dd3fc; text-transform:uppercase; }
  .options { display:flex; gap:14px; flex-wrap:wrap; justify-content:center; }
  .opt-btn {
    background:#141c2e; border:2px solid #2c3c5c; color:#dce8ff;
    padding:14px 20px; border-radius:12px; cursor:pointer; font-size:0.95em;
    display:flex; flex-direction:column; align-items:center; gap:6px; min-width:100px;
    transition: all .15s ease;
  }
  .opt-btn:hover { border-color:#4fc3f7; transform:translateY(-2px); }
  .opt-btn.selected { border-color:#4fc3f7; background:#1c2942; box-shadow:0 0 14px rgba(79,195,247,.6); }
  .opt-icon { font-size:1.8em; }
  #startBtn {
    margin-top:10px; background:linear-gradient(135deg,#4fc3f7,#1e88e5); border:none;
    color:#04101c; font-weight:700; font-size:1.15em; padding:14px 46px; border-radius:30px;
    cursor:pointer; letter-spacing:1px; box-shadow:0 6px 20px rgba(79,195,247,.4);
  }
  #startBtn:disabled { opacity:.4; cursor:not-allowed; box-shadow:none; }
  #startBtn:not(:disabled):hover { transform:scale(1.05); }

  /* ---------- GAME ---------- */
  #gameWrap { position:fixed; inset:0; display:none; background:#000; }
  #gameCanvas { display:block; width:100%; height:100%; }
  #hud {
    position:absolute; top:14px; left:14px; right:14px; display:flex; justify-content:space-between;
    color:#fff; font-size:1.1em; text-shadow:0 2px 6px rgba(0,0,0,.8); pointer-events:none;
  }
  #hud .box { background:rgba(0,0,0,.35); padding:8px 16px; border-radius:10px; backdrop-filter:blur(2px); }
  #speedWrap { position:absolute; bottom:20px; right:20px; width:130px; text-align:center; color:#fff; pointer-events:none; text-shadow:0 2px 6px rgba(0,0,0,.8);}
  #speedBar { width:100%; height:8px; background:rgba(255,255,255,.2); border-radius:4px; overflow:hidden; margin-top:4px; }
  #speedFill { height:100%; width:0%; background:linear-gradient(90deg,#4fc3f7,#ff5252); }
  #controlsHint {
    position:absolute; bottom:16px; left:16px; color:#cfe0ff; font-size:.85em;
    background:rgba(0,0,0,.35); padding:8px 12px; border-radius:8px; pointer-events:none;
  }
  #gameOver {
    position:absolute; inset:0; display:none; align-items:center; justify-content:center; flex-direction:column;
    background:rgba(5,8,16,.82); color:#fff; gap:16px; text-align:center;
  }
  #gameOver h2 { font-size:2.2em; color:#ff5252; text-shadow:0 0 20px rgba(255,82,82,.7);}
  #gameOver button, #backBtn {
    background:linear-gradient(135deg,#4fc3f7,#1e88e5); border:none; color:#04101c; font-weight:700;
    font-size:1em; padding:12px 32px; border-radius:26px; cursor:pointer;
  }
  #topBar { position:absolute; top:10px; right:10px; }
  #topBar button { background:rgba(0,0,0,.4); border:1px solid #2c3c5c; color:#cfe0ff; padding:8px 14px; border-radius:8px; cursor:pointer; }
</style>
</head>
<body>

<!-- ================= MENU ================= -->
<div id="menu">
  <h1>🏁 HILL RACER</h1>
  <p class="sub">Pick your ride, pick the weather, then hit the twisty hill road.</p>

  <div class="section">
    <h2>Vehicle</h2>
    <div class="options" id="vehicleOptions">
      <div class="opt-btn" data-vehicle="car"><span class="opt-icon">🚗</span>Car</div>
      <div class="opt-btn" data-vehicle="bike"><span class="opt-icon">🏍️</span>Bike</div>
    </div>
  </div>

  <div class="section">
    <h2>Climate</h2>
    <div class="options" id="climateOptions">
      <div class="opt-btn" data-climate="sunny"><span class="opt-icon">☀️</span>Sunny</div>
      <div class="opt-btn" data-climate="rain"><span class="opt-icon">🌧️</span>Rain</div>
      <div class="opt-btn" data-climate="snow"><span class="opt-icon">❄️</span>Snow</div>
      <div class="opt-btn" data-climate="night"><span class="opt-icon">🌙</span>Night</div>
    </div>
  </div>

  <button id="startBtn" disabled>START ENGINE</button>
</div>

<!-- ================= GAME ================= -->
<div id="gameWrap">
  <canvas id="gameCanvas"></canvas>
  <div id="hud">
    <div class="box">Distance: <span id="distVal">0</span> m</div>
    <div class="box">Best: <span id="bestVal">0</span> m</div>
  </div>
  <div id="speedWrap">
    <div id="speedText">0 km/h</div>
    <div id="speedBar"><div id="speedFill"></div></div>
  </div>
  <div id="controlsHint">⬅️➡️ / A D steer &nbsp; | &nbsp; ⬆️ / W boost &nbsp; | &nbsp; ⬇️ / S brake</div>
  <div id="topBar"><button id="menuBtn">☰ Menu</button></div>
  <div id="gameOver">
    <h2>💥 CRASHED!</h2>
    <div id="finalDist">Distance: 0 m</div>
    <button id="retryBtn">Try Again</button>
  </div>
</div>

<script>
(function(){
  "use strict";

  /* ---------------- MENU LOGIC ---------------- */
  let chosenVehicle = null, chosenClimate = null;
  const vehicleOptions = document.getElementById('vehicleOptions');
  const climateOptions = document.getElementById('climateOptions');
  const startBtn = document.getElementById('startBtn');

  function wireOptions(container, key, cb){
    container.querySelectorAll('.opt-btn').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        container.querySelectorAll('.opt-btn').forEach(b=>b.classList.remove('selected'));
        btn.classList.add('selected');
        cb(btn.dataset[key]);
        checkReady();
      });
    });
  }
  wireOptions(vehicleOptions,'vehicle', v=>chosenVehicle=v);
  wireOptions(climateOptions,'climate', c=>chosenClimate=c);
  function checkReady(){ startBtn.disabled = !(chosenVehicle && chosenClimate); }

  startBtn.addEventListener('click', ()=>{
    document.getElementById('menu').style.display='none';
    document.getElementById('gameWrap').style.display='block';
    Game.start(chosenVehicle, chosenClimate);
  });
  document.getElementById('menuBtn').addEventListener('click', ()=>{
    Game.stop();
    document.getElementById('gameWrap').style.display='none';
    document.getElementById('gameOver').style.display='none';
    document.getElementById('menu').style.display='flex';
  });
  document.getElementById('retryBtn').addEventListener('click', ()=>{
    document.getElementById('gameOver').style.display='none';
    Game.start(chosenVehicle, chosenClimate);
  });

  /* ---------------- GAME (pseudo-3D road) ---------------- */
  const Game = (function(){
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let W=0,H=0;
    function resize(){
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);

    // ---- config ----
    const segmentLength = 200;
    const roadWidth = 2000;
    const rumbleLength = 3;
    const lanes = 3;
    const cameraHeight = 1200;
    const drawDistance = 200;
    const fogDensity = 4;
    let cameraDepth = 1;

    const COLORS = {
      LIGHT:  {road:'#6b6b6b', grass:'#16a34a', rumble:'#e5e5e5', lane:'#e5e5e5'},
      DARK:   {road:'#656565', grass:'#149146', rumble:'#b91c1c'}
    };

    let segments = [];
    let trackLength = 0;
    let position = 0, playerX = 0, speed = 0;
    let maxSpeed = segmentLength * 0.14; // units per frame-equivalent, scaled by dt
    let accel = maxSpeed/3.2, breakingA = -maxSpeed*2.2, decel = -maxSpeed/2.6;
    let offRoadDecel = -maxSpeed*1.4, offRoadLimit = maxSpeed*0.35;
    let centrifugal = 0.32;
    let bestDistance = parseInt(localStorage.getItem('hillRacerBest')||'0',10);
    document.getElementById('bestVal').textContent = bestDistance;

    let keyLeft=false, keyRight=false, keyUp=false, keyDown=false;
    let vehicle='car', climate='sunny';
    let running=false, crashed=false, rafId=null, lastT=0;

    // particles for weather
    let particles = [];
    function initParticles(){
      particles = [];
      if (climate==='rain' || climate==='snow'){
        const count = climate==='rain'?140:90;
        for(let i=0;i<count;i++){
          particles.push({x:Math.random()*W, y:Math.random()*H, s:2+Math.random()*4});
        }
      }
    }

    function findSegment(z){
      return segments[Math.floor(z/segmentLength) % segments.length];
    }

    function lastY(){ return segments.length===0 ? 0 : segments[segments.length-1].p2.world.y; }

    function addSegment(curve, y){
      const n = segments.length;
      segments.push({
        index:n,
        curve:curve,
        p1:{world:{y:lastY(), z:n*segmentLength}, camera:{}, screen:{}},
        p2:{world:{y:y, z:(n+1)*segmentLength}, camera:{}, screen:{}},
        color: Math.floor(n/rumbleLength)%2 ? COLORS.DARK : COLORS.LIGHT,
        clip:0, obstacle:null
      });
    }
    function addRoad(enter, hold, leave, curve, y){
      const startY = lastY();
      const endY = startY + (y*segmentLength);
      const total = enter+hold+leave;
      for(let i=0;i<enter;i++) addSegment(easeIn(0,curve,i/enter), easeInOutY(startY,endY,(i)/total));
      for(let i=0;i<hold;i++) addSegment(curve, easeInOutY(startY,endY,(enter+i)/total));
      for(let i=0;i<leave;i++) addSegment(easeInOut(curve,0,i/leave), easeInOutY(startY,endY,(enter+hold+i)/total));
    }
    function easeIn(a,b,p){ return a + (b-a)*Math.pow(p,2); }
    function easeInOut(a,b,p){ return a + (b-a)*((-Math.cos(p*Math.PI)/2)+0.5); }
    function easeInOutY(a,b,p){ return a + (b-a)*((-Math.cos(p*Math.PI)/2)+0.5); }

    function resetRoad(){
      segments = [];
      // build a long track: straights, curves, hills, mixed
      addRoad(50,50,50,0,0);
      addRoad(50,50,50,3,0);
      addRoad(40,60,40,-3,40);
      addRoad(60,60,60,0,-40);
      addRoad(30,80,30,4,60);
      addRoad(40,40,40,-5,-30);
      addRoad(50,80,50,2,50);
      addRoad(40,60,40,-2,0);
      addRoad(30,40,30,6,80);
      addRoad(30,40,30,-6,-60);
      addRoad(50,50,50,0,0);
      addRoad(40,70,40,3,50);
      addRoad(40,70,40,-4,-40);
      addRoad(50,100,50,1,30);
      addRoad(50,50,50,-1,0);
      addRoad(30,60,30,5,70);
      addRoad(30,60,30,-5,0);
      addRoad(60,80,60,0,-50);
      addRoad(50,50,50,2,20);
      addRoad(50,50,50,-2,0);
      // loop back to flat to allow seamless wrap-ish feel
      trackLength = segments.length * segmentLength;
    }

    function project(p, camX, camY, camZ, camDepth, width, height, roadW){
      p.camera.x = (p.world.x||0) - camX;
      p.camera.y = (p.world.y||0) - camY;
      p.camera.z = (p.world.z||0) - camZ;
      const scale = camDepth / p.camera.z;
      p.screen.scale = scale;
      p.screen.x = Math.round((width/2) + (scale * p.camera.x * width/2));
      p.screen.y = Math.round((height/2) - (scale * p.camera.y * height/2));
      p.screen.w = Math.round(scale * roadW * width/2);
    }

    function increase(start,step,max){ let r=start+step; while(r>=max) r-=max; while(r<0) r+=max; return r; }

    function polygon(x1,y1,x2,y2,x3,y3,x4,y4,color){
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.lineTo(x3,y3); ctx.lineTo(x4,y4);
      ctx.closePath(); ctx.fill();
    }

    function skyColors(){
      switch(climate){
        case 'night': return ['#03060f','#0c1830'];
        case 'rain': return ['#3a4250','#5a6472'];
        case 'snow': return ['#c7d6e8','#e8eff8'];
        default: return ['#4fb8e8','#bfe8ff'];
      }
    }

    function drawBackground(){
      const [top,bottom] = skyColors();
      const grad = ctx.createLinearGradient(0,0,0,H*0.6);
      grad.addColorStop(0, top); grad.addColorStop(1, bottom);
      ctx.fillStyle = grad;
      ctx.fillRect(0,0,W,H*0.65);

      // hills silhouette (parallax) - not the road, background mountains
      ctx.fillStyle = climate==='night' ? '#0a1424' : (climate==='snow' ? '#dfe9f4' : '#2f7a4d');
      ctx.globalAlpha = 0.55;
      ctx.beginPath();
      ctx.moveTo(0,H*0.42);
      for(let x=0;x<=W;x+=40){
        const off = (position*0.00025);
        const hgt = Math.sin((x*0.01)+off)*22 + Math.sin((x*0.005)+off*1.7)*30;
        ctx.lineTo(x, H*0.42 - hgt - 40);
      }
      ctx.lineTo(W,H*0.6); ctx.lineTo(0,H*0.6); ctx.closePath(); ctx.fill();
      ctx.globalAlpha = 1;

      if(climate==='night'){
        ctx.fillStyle='#fff';
        for(let i=0;i<60;i++){
          const sx=(i*97)%W, sy=(i*53)%Math.floor(H*0.4);
          ctx.globalAlpha = 0.3+((i*37)%70)/100;
          ctx.fillRect(sx,sy,2,2);
        }
        ctx.globalAlpha=1;
      } else if(climate==='sunny'){
        ctx.fillStyle='#fff6c9';
        ctx.beginPath(); ctx.arc(W*0.82,H*0.16,46,0,Math.PI*2); ctx.fill();
      }
    }

    function drawWeather(){
      if(climate==='rain'){
        ctx.strokeStyle='rgba(200,220,255,0.55)'; ctx.lineWidth=1.5;
        particles.forEach(p=>{
          ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p.x-2,p.y+14); ctx.stroke();
          p.y += 16+p.s*3; p.x -= 2;
          if(p.y>H){ p.y=-10; p.x=Math.random()*W; }
        });
      } else if(climate==='snow'){
        ctx.fillStyle='rgba(255,255,255,0.9)';
        particles.forEach(p=>{
          ctx.beginPath(); ctx.arc(p.x,p.y,p.s*0.6,0,Math.PI*2); ctx.fill();
          p.y += p.s*0.8; p.x += Math.sin(p.y*0.02)*0.6;
          if(p.y>H){ p.y=-10; p.x=Math.random()*W; }
        });
      }
    }

    function drawVehicle(steerLean){
      const cx = W/2, baseY = H*0.92;
      ctx.save();
      ctx.translate(cx, baseY);
      const lean = steerLean*8;
      ctx.rotate(lean*Math.PI/180*0.15);
      if(vehicle==='car'){
        ctx.fillStyle='#1e88e5';
        ctx.beginPath();
        ctx.moveTo(-70,20); ctx.lineTo(-55,-28); ctx.lineTo(55,-28); ctx.lineTo(70,20);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle='#0d47a1';
        ctx.fillRect(-40,-24,80,20);
        ctx.fillStyle='#cfe8ff';
        ctx.fillRect(-30,-22,60,14);
        ctx.fillStyle='#111';
        ctx.fillRect(-72,14,16,16);
        ctx.fillRect(56,14,16,16);
        ctx.fillStyle='#ffeb3b';
        ctx.fillRect(-55,-4,12,8);
        ctx.fillRect(43,-4,12,8);
      } else {
        ctx.fillStyle='#e53935';
        ctx.beginPath();
        ctx.moveTo(0,-30); ctx.lineTo(-14,10); ctx.lineTo(14,10); ctx.closePath(); ctx.fill();
        ctx.fillStyle='#222';
        ctx.beginPath(); ctx.arc(-18,22,16,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(18,22,16,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#ffeb3b';
        ctx.fillRect(-6,-34,12,8);
      }
      ctx.restore();
    }

    function render(){
      drawBackground();

      const baseSegment = findSegment(position);
      const basePercent = (position % segmentLength) / segmentLength;
      let maxy = H;
      let x = 0, dx = -(baseSegment.curve * basePercent);
      cameraDepth = 1/Math.tan((100/2)*Math.PI/180);
      const camHeight = cameraHeight + baseSegment.p1.world.y;

      for(let n=0; n<drawDistance; n++){
        const seg = segments[(baseSegment.index+n)%segments.length];
        const looped = seg.index < baseSegment.index;
        const camZOffset = looped ? trackLength : 0;

        seg.looped = looped;
        project(seg.p1, (playerX*roadWidth) - x, camHeight, position - camZOffset, cameraDepth, W, H, roadWidth);
        project(seg.p2, (playerX*roadWidth) - x - dx, camHeight, position - camZOffset, cameraDepth, W, H, roadWidth);

        x += dx;
        dx += seg.curve;

        seg.clip = maxy;
        if(seg.p1.camera.z <= cameraDepth || seg.p2.screen.y >= seg.p1.screen.y || seg.p2.screen.y >= maxy) continue;

        const c = seg.color;
        const grassOn = climate==='snow' ? '#e6f0fa' : c.grass;

        // grass full width
        ctx.fillStyle = grassOn;
        ctx.fillRect(0, seg.p2.screen.y, W, seg.p1.screen.y - seg.p2.screen.y);

        const r1 = rumbleWidth(seg.p1.screen.w, lanes);
        const r2 = rumbleWidth(seg.p2.screen.w, lanes);
        polygon(seg.p1.screen.x-seg.p1.screen.w-r1, seg.p1.screen.y, seg.p1.screen.x-seg.p1.screen.w, seg.p1.screen.y,
                seg.p2.screen.x-seg.p2.screen.w, seg.p2.screen.y, seg.p2.screen.x-seg.p2.screen.w-r2, seg.p2.screen.y, c.rumble);
        polygon(seg.p1.screen.x+seg.p1.screen.w, seg.p1.screen.y, seg.p1.screen.x+seg.p1.screen.w+r1, seg.p1.screen.y,
                seg.p2.screen.x+seg.p2.screen.w+r2, seg.p2.screen.y, seg.p2.screen.x+seg.p2.screen.w, seg.p2.screen.y, c.rumble);
        polygon(seg.p1.screen.x-seg.p1.screen.w, seg.p1.screen.y, seg.p1.screen.x+seg.p1.screen.w, seg.p1.screen.y,
                seg.p2.screen.x+seg.p2.screen.w, seg.p2.screen.y, seg.p2.screen.x-seg.p2.screen.w, seg.p2.screen.y, c.road);

        if(c.lane){
          const l1 = laneMarkerWidth(seg.p1.screen.w, lanes);
          const l2 = laneMarkerWidth(seg.p2.screen.w, lanes);
          const lw1 = seg.p1.screen.w*2/lanes, lw2 = seg.p2.screen.w*2/lanes;
          let lx1 = seg.p1.screen.x - seg.p1.screen.w + lw1, lx2 = seg.p2.screen.x - seg.p2.screen.w + lw2;
          for(let lane=1; lane<lanes; lane++, lx1+=lw1, lx2+=lw2){
            polygon(lx1-l1/2, seg.p1.screen.y, lx1+l1/2, seg.p1.screen.y, lx2+l2/2, seg.p2.screen.y, lx2-l2/2, seg.p2.screen.y, c.lane);
          }
        }
        maxy = seg.p2.screen.y;
      }

      drawWeather();
      const curveNow = baseSegment.curve;
      const lean = Math.max(-1,Math.min(1, curveNow*0.15 + (keyLeft?-0.5:0) + (keyRight?0.5:0)));
      drawVehicle(lean);
    }

    function rumbleWidth(projWidth, lanesN){ return projWidth/Math.max(6, 2*lanesN); }
    function laneMarkerWidth(projWidth, lanesN){ return projWidth/Math.max(32, 8*lanesN); }

    function update(dt){
      position = increase(position, dt*speed, trackLength);
      const seg = findSegment(position);
      const speedPercent = speed/maxSpeed;
      const dx = dt * 2 * speedPercent;

      playerX -= (dx * (keyLeft?1:0));
      playerX += (dx * (keyRight?1:0));
      playerX -= (dx * 0.5 * seg.curve * centrifugal * speedPercent);

      if(keyUp) speed += accel*dt*60/60;
      else if(keyDown) speed += breakingA*dt;
      else speed += decel*dt;

      if((playerX<-1 || playerX>1) && speed>offRoadLimit) speed += offRoadDecel*dt;

      speed = Math.max(0, Math.min(speed, maxSpeed));
      playerX = Math.max(-2, Math.min(2, playerX));

      if(Math.abs(playerX) > 1.05 && speed > maxSpeed*0.55 && Math.random()<0.002){
        crash();
      }

      const distMeters = Math.floor(position/100);
      document.getElementById('distVal').textContent = distMeters;
      const kmh = Math.floor((speed/maxSpeed)*220);
      document.getElementById('speedText').textContent = kmh+' km/h';
      document.getElementById('speedFill').style.width = Math.min(100, (speed/maxSpeed)*100)+'%';
    }

    function crash(){
      if(crashed) return;
      crashed = true;
      running = false;
      const distMeters = Math.floor(position/100);
      if(distMeters>bestDistance){ bestDistance=distMeters; localStorage.setItem('hillRacerBest', bestDistance); }
      document.getElementById('bestVal').textContent = bestDistance;
      document.getElementById('finalDist').textContent = 'Distance: '+distMeters+' m';
      document.getElementById('gameOver').style.display='flex';
    }

    function loop(t){
      if(!running) return;
      const dt = Math.min(0.05, (t-lastT)/1000 || 0.016);
      lastT = t;
      update(dt);
      render();
      rafId = requestAnimationFrame(loop);
    }

    function keydown(e){
      if(e.keyCode===37||e.keyCode===65) keyLeft=true;
      if(e.keyCode===39||e.keyCode===68) keyRight=true;
      if(e.keyCode===38||e.keyCode===87) keyUp=true;
      if(e.keyCode===40||e.keyCode===83) keyDown=true;
    }
    function keyup(e){
      if(e.keyCode===37||e.keyCode===65) keyLeft=false;
      if(e.keyCode===39||e.keyCode===68) keyRight=false;
      if(e.keyCode===38||e.keyCode===87) keyUp=false;
      if(e.keyCode===40||e.keyCode===83) keyDown=false;
    }

    // touch controls (basic: left/right half of screen)
    function touchstart(e){
      const x = e.touches[0].clientX;
      if(x < W/2) keyLeft=true; else keyRight=true;
      keyUp = true;
    }
    function touchend(){ keyLeft=false; keyRight=false; }

    function start(v,c){
      vehicle=v; climate=c;
      resize();
      resetRoad();
      initParticles();
      position=0; playerX=0; speed=maxSpeed*0.25;
      crashed=false; running=true; lastT=performance.now();
      document.getElementById('gameOver').style.display='none';
      window.addEventListener('keydown', keydown);
      window.addEventListener('keyup', keyup);
      canvas.addEventListener('touchstart', touchstart);
      canvas.addEventListener('touchend', touchend);
      cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(loop);
    }
    function stop(){
      running=false;
      cancelAnimationFrame(rafId);
      window.removeEventListener('keydown', keydown);
      window.removeEventListener('keyup', keyup);
      canvas.removeEventListener('touchstart', touchstart);
      canvas.removeEventListener('touchend', touchend);
    }

    return { start, stop };
  })();

})();
</script>
</body>
</html>
